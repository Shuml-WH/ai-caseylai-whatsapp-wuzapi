name = "ai-caseylai-whatsapp-wuzapi"
main = "worker.js"
compatibility_date = "2026-07-03"

# Simple Worker — serves HTML + proxies/translates API to wuzapi
# wuzapi runs on your PC, cloudflared tunnel exposes it (FREE)
# D1 database for persistent storage of bots, messages, API keys

[[d1_databases]]
binding = "wuzapi_db"
database_name = "wuzapi-db"
database_id = "990d8f53-3c5a-4b7e-a16b-320f6a397e60"

[observability]
enabled = true
head_sampling_rate = 1
